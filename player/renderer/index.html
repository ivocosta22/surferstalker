<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src https://img.youtube.com; style-src 'unsafe-inline'; script-src 'self'" />
  <title>SurferStalker Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      color: #efeff1;
      height: 100vh;
      display: flex;
      justify-content: flex-end;
      overflow: hidden;
      user-select: none;
    }

    #sidebar {
      width: 320px;
      height: 100vh;
      background: #18181b;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #2d2d31;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #2d2d31;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #bf94ff;
      text-transform: uppercase;
    }

    #bot-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #adadb8;
    }

    #bot-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3d3d43;
      transition: background 0.3s;
    }

    #bot-dot.connected { background: #00b16a; }

    /* ── Now Playing ── */
    #now-playing {
      padding: 16px;
      border-bottom: 1px solid #2d2d31;
      flex-shrink: 0;
    }

    #now-playing .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #adadb8;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #thumbnail-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 6px;
      overflow: hidden;
      background: #0e0e10;
      margin-bottom: 10px;
    }

    #thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #thumbnail.hidden { display: none; }

    #thumbnail-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3d3d43;
      font-size: 32px;
    }

    #track-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-requester {
      font-size: 11px;
      color: #adadb8;
    }

    #idle-msg {
      font-size: 12px;
      color: #adadb8;
      text-align: center;
      padding: 8px 0;
    }

    /* ── Controls ── */
    #controls {
      padding: 12px 16px;
      border-bottom: 1px solid #2d2d31;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    #control-buttons {
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #btn-pause {
      background: #bf94ff;
      color: #0e0e10;
      flex: 1;
    }

    #btn-pause:hover:not(:disabled) { background: #a970ff; }

    #btn-skip {
      background: #2d2d31;
      color: #efeff1;
      flex: 1;
    }

    #btn-skip:hover:not(:disabled) { background: #3d3d43; }

    #volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #volume-row span {
      font-size: 11px;
      color: #adadb8;
      width: 28px;
      flex-shrink: 0;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #3d3d43;
      outline: none;
      cursor: pointer;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #bf94ff;
      cursor: pointer;
    }

    /* ── Requests toggle ── */
    #requests-toggle {
      margin: 0 16px;
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      width: calc(100% - 32px);
      transition: background 0.2s;
    }

    #requests-toggle.enabled {
      background: #00b16a22;
      color: #00b16a;
      border: 1px solid #00b16a55;
    }

    #requests-toggle.enabled:hover { background: #00b16a33; }

    #requests-toggle.disabled {
      background: #eb0f0f22;
      color: #eb6060;
      border: 1px solid #eb0f0f55;
    }

    #requests-toggle.disabled:hover { background: #eb0f0f33; }

    /* ── Queue ── */
    #queue-header {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #queue-header .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #adadb8;
      text-transform: uppercase;
    }

    #btn-clear {
      background: transparent;
      color: #adadb8;
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #3d3d43;
      border-radius: 4px;
    }

    #btn-clear:hover:not(:disabled) { color: #efeff1; border-color: #6d6d7a; }

    #queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
    }

    #queue-list::-webkit-scrollbar { width: 4px; }
    #queue-list::-webkit-scrollbar-track { background: transparent; }
    #queue-list::-webkit-scrollbar-thumb { background: #3d3d43; border-radius: 2px; }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 8px;
      border-radius: 6px;
      transition: background 0.1s;
      position: relative;
    }

    .queue-item:hover { background: #2d2d31; }

    .queue-item:hover .queue-item-remove { opacity: 1; }

    .queue-item img {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 3px;
      background: #0e0e10;
      flex-shrink: 0;
    }

    .queue-item-info {
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .queue-item-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-requester {
      font-size: 10px;
      color: #adadb8;
      margin-top: 2px;
    }

    .queue-item-remove {
      opacity: 0;
      background: transparent;
      border: none;
      color: #adadb8;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.1s, opacity 0.1s;
    }

    .queue-item-remove:hover { color: #eb6060; }

    #queue-empty {
      text-align: center;
      font-size: 12px;
      color: #3d3d43;
      padding: 24px 0;
    }

    /* ── Backup playlist ── */
    #backup-section {
      padding: 10px 16px 12px;
      border-top: 1px solid #2d2d31;
      flex-shrink: 0;
    }

    #backup-section .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #adadb8;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #backup-mode-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3d3d43;
      transition: background 0.3s;
    }

    #backup-mode-dot.active { background: #f9a825; }

    #backup-input {
      flex: 1;
      background: #0e0e10;
      border: 1px solid #3d3d43;
      border-radius: 6px;
      color: #efeff1;
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    #backup-input:focus { border-color: #bf94ff; }
    #backup-input::placeholder { color: #3d3d43; }

    #backup-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #btn-backup-update {
      background: #2d2d31;
      color: #efeff1;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 10px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    #btn-backup-update:hover { background: #3d3d43; }
  </style>
</head>
<body>
  <div id="sidebar">

    <div id="header">
      <h1>Song Queue</h1>
      <div id="bot-status">
        <div id="bot-dot"></div>
        <span id="bot-label">Bot offline</span>
      </div>
    </div>

    <div id="now-playing">
      <div class="label">Now Playing</div>
      <div id="thumbnail-wrap">
        <img id="thumbnail" src="" alt="" class="hidden" />
        <div id="thumbnail-placeholder">♫</div>
      </div>
      <div id="track-info" style="display:none">
        <div id="track-title"></div>
        <div id="track-requester"></div>
      </div>
      <div id="idle-msg">Waiting for song requests...</div>
    </div>

    <div id="controls">
      <div id="control-buttons">
        <button id="btn-pause" disabled>▶ Play</button>
        <button id="btn-skip" disabled>⏭ Skip</button>
      </div>
      <div id="volume-row">
        <span>Vol</span>
        <input id="volume-slider" type="range" min="0" max="100" value="100" />
        <span id="volume-label">100</span>
      </div>
    </div>

    <button id="requests-toggle" class="enabled">✅ Requests: ON</button>

    <div id="queue-header">
      <div class="label">Up Next <span id="queue-count"></span></div>
      <button id="btn-clear" disabled>Clear</button>
    </div>

    <div id="queue-list">
      <div id="queue-empty">Queue is empty</div>
    </div>

    <div id="backup-section">
      <div class="label">
        <div id="backup-mode-dot"></div>
        Backup Playlist
      </div>
      <div id="backup-input-row">
        <input id="backup-input" type="text" placeholder="YouTube playlist URL" spellcheck="false" />
        <button id="btn-backup-update">Update</button>
      </div>
    </div>

  </div>
  <script src="index.js"></script>
</body>
</html>
